# NOTE: This is a working example config for the developer's local dataset.
# Paths under colabfold/foldseek point to local data (incoming/) not shipped in git.
# To start your own project, copy a template instead:
#   cp run_templates/local_run.yaml.template run_configs/my_project.yaml
#
# VermAMG schema v2 LIVE example: FASTA -> ColabFold -> Foldseek -> downstream.
# Count-agnostic: whatever N records the FASTA has flow through unchanged.
#
# To actually run compute, set colabfold.dry_run / foldseek.dry_run to false on
# a node where the tools and DBs exist:
#   - colabfold.mode=live needs a ColabFold install (GPU recommended).
#   - foldseek.mode=live needs resources.foldseek_bin + the two DBs.
# On HPC set environment.backend: slurm and fill the slurm.* block.

schema_version: 2

project:
  name: "HOXD Viral AMG Screen Live"
  slug: ""

sample:
  name: ""
  slug: ""

analysis:
  mode: full

environment:
  backend: local        # local (GPU box) | slurm (TRUBA / HPC)
  profile: local_wsl

run:
  label: "hoxd_live_v2_example"
  root: "runs/{project_slug}/{run_label}"
  layout_version: 2
  resume_policy: skip_pass
  overwrite_policy: fail_if_outputs_exist
  import_policy: copy

inputs:
  # Provide your own FASTA. The pipeline processes exactly these records.
  fasta: "00_inputs/tier1_amg.faa"
  metadata_tsv: "00_inputs/full665_amg_sequence_metadata.tsv"

input_intake:
  id_policy: preserve_first_token
  duplicate_policy: fail
  min_sequence_length: 1
  invalid_sequence_policy: fail

metadata:
  id_column: protein_id
  required: false
  strict_extra_rows: false

batching:
  enabled: true
  strategy: fixed_size
  batch_size: 128
  target_batches: 0
  max_sequences: 0
  batch_prefix: "{project_slug}"

backend_jobs:
  dry_run: true
  submit_jobs: false
  emit_local_bundle: true
  emit_slurm_bundle: true
  plan_colabfold: true
  plan_foldseek: true
  local_threads: 4

slurm:
  account: ""
  partition_cpu: ""
  partition_gpu: ""
  partition_debug: ""
  cpus_cpu: 8
  cpus_gpu: 10
  mem_cpu: "16G"
  mem_gpu: "32G"
  time_cpu: "12:00:00"
  time_gpu: "12:00:00"

colabfold:
  mode: live
  cmd: "colabfold_batch"
  msa_mode: "mmseqs2_uniref_env"
  model_type: "alphafold2_ptm"
  num_recycle: "3"
  num_models: "1"
  dry_run: true            # set false on a GPU/compute node to predict structures

foldseek:
  mode: live
  threads: 4
  dry_run: true            # set false where foldseek_bin + DBs are available

resources:
  java_bin: "java"
  p2rank_cmd: "resources/tools/p2rank/current/prank"
  p2rank_jar: "resources/tools/p2rank/current/bin/p2rank.jar"
  foldseek_bin: ""         # e.g. resources/tools/foldseek/bin/foldseek
  pdb_foldseek_db: ""      # e.g. resources/dbs/pdb/pdb
  afsp_foldseek_db: ""     # e.g. resources/dbs/afsp/afsp

reference_materialization:
  method: full_atom_cache
  source_run_root: "runs/tier1_tier2_colabfold_postrun_fresh_v1_fullatom_refs_v1"
  overwrite: false
  guard_reference_atom_names: true
  allow_ca_only_diagnostic: false

stages:
  input_intake: true
  batch_plan: true
  backend_job_plan: true
  import_colabfold: true   # mode=live -> runs ColabFold adapter
  import_foldseek: true    # mode=live -> runs Foldseek adapter
  foldseek_search: false
  m06b_m07b: true
  m08: true
  m09: true
  p2rank: true
  m10a_d: true
  m10f_render: false
  m11: true
  m12: true
  m13: true
  m14: true
  interpretation_ready_export: true

p2rank:
  threads: 4
  chunk_size: 64

safety:
  require_run_root_outputs_only: true
  stop_on_dirty_partial_output: true
